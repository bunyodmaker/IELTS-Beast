<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            padding: 20px;
            color: #1a202c;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #2b6cb0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 16px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #2b6cb0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        .login-box button:hover { background: #1a4f7a; }
        .login-box .error { color: #e53e3e; margin-top: 10px; display: none; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #2b6cb0;
        }
        .stat-card .label {
            font-size: 14px;
            color: #4a5568;
            margin-top: 5px;
        }
        
        table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-top: 20px;
        }
        th {
            background: #2b6cb0;
            color: white;
            padding: 12px 16px;
            text-align: left;
        }
        td {
            padding: 10px 16px;
            border-bottom: 1px solid #edf2f7;
        }
        tr:hover { background: #f7fafc; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .badge-high { background: #c6f6d5; color: #22543d; }
        .badge-mid { background: #fefcbf; color: #975a16; }
        .badge-low { background: #fed7d7; color: #9b2c2c; }
        .loading { text-align: center; padding: 40px; color: #4a5568; }
        .hidden { display: none; }
        .refresh-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 15px;
        }
        .refresh-btn:hover { background: #38a169; }
        .header-actions {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logout-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn:hover { background: #c53030; }
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            table { font-size: 13px; }
            td, th { padding: 8px 10px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Login form -->
    <div id="loginBox" class="login-box">
        <h2 style="margin-bottom:20px;">🔐 Admin kirish</h2>
        <input type="password" id="passwordInput" placeholder="Parolni kiriting" />
        <button onclick="login()">Kirish</button>
        <div id="loginError" class="error">Noto‘g‘ri parol</div>
    </div>

    <!-- Admin panel -->
    <div id="adminPanel" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:10px;">
            <h1>📊 IELTS Admin Panel</h1>
            <div class="header-actions">
                <button class="refresh-btn" onclick="loadData()">🔄 Yangilash</button>
                <button class="logout-btn" onclick="logout()">🚪 Chiqish</button>
            </div>
        </div>
        <p style="color:#4a5568; margin-bottom:20px;">Barcha test natijalari va statistika</p>

        <!-- Statistika kartalari -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="number" id="totalTests">-</div><div class="label">Jami testlar</div></div>
            <div class="stat-card"><div class="number" id="avgScore">-</div><div class="label">O‘rtacha ball</div></div>
            <div class="stat-card"><div class="number" id="maxScore">-</div><div class="label">Eng yuqori ball</div></div>
            <div class="stat-card"><div class="number" id="avgBand">-</div><div class="label">O‘rtacha Band</div></div>
            <div class="stat-card"><div class="number" id="weekCount">-</div><div class="label">Bu hafta</div></div>
            <div class="stat-card"><div class="number" id="weekAvg">-</div><div class="label">Haftalik o‘rtacha</div></div>
        </div>

        <!-- Natijalar jadvali -->
        <h2 style="margin:30px 0 10px;">📋 So‘nggi natijalar</h2>
        <div id="loadingIndicator" class="loading">⏳ Yuklanmoqda...</div>
        <div id="tableWrapper" class="hidden">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Ism</th>
                        <th>Ball (40)</th>
                        <th>Band</th>
                        <th>Vaqt (daqiqa)</th>
                        <th>Sana</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = 'admin123'; // Parolni xohlaganingizga o'zgartiring

    function login() {
        const password = document.getElementById('passwordInput').value;
        if (password === ADMIN_PASSWORD) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('loginError').style.display = 'none';
            loadData();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function logout() {
        document.getElementById('loginBox').style.display = 'block';
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('passwordInput').value = '';
    }

   async function loadData() {
    const loading = document.getElementById('loadingIndicator');
    const tableWrapper = document.getElementById('tableWrapper');
    loading.classList.remove('hidden');
    tableWrapper.classList.add('hidden');

    try {
        const response = await fetch('/api/admin_stats.py?password=' + ADMIN_PASSWORD);
        if (!response.ok) {
            // Xatolik matnini o'qib, chiqaramiz
            const text = await response.text();
            throw new Error('Server javobi: ' + response.status + ' - ' + text);
        }
        const data = await response.json();
        
        // Statistikani yangilash
        document.getElementById('totalTests').textContent = data.total || 0;
        document.getElementById('avgScore').textContent = data.avg_score || 0;
        document.getElementById('maxScore').textContent = data.max_score || 0;
        document.getElementById('avgBand').textContent = data.avg_band || 0;
        document.getElementById('weekCount').textContent = data.week_count || 0;
        document.getElementById('weekAvg').textContent = data.week_avg || 0;

        // Jadvalni to'ldirish
        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = '';
        if (data.recent && data.recent.length > 0) {
            data.recent.forEach((row, index) => {
                const tr = document.createElement('tr');
                const band = row.band || 0;
                let badgeClass = 'badge-mid';
                if (band >= 7) badgeClass = 'badge-high';
                else if (band < 5) badgeClass = 'badge-low';
                
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${row.name || 'Anonim'}</td>
                    <td>${row.score || 0}</td>
                    <td><span class="badge ${badgeClass}">${band}</span></td>
                    <td>${row.time || 0}</td>
                    <td>${row.date ? new Date(row.date).toLocaleString('uz-UZ') : '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        } else {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#4a5568;">Hozircha natijalar yo‘q</td></tr>';
        }

        loading.classList.add('hidden');
        tableWrapper.classList.remove('hidden');
    } catch (error) {
        loading.textContent = '❌ Xatolik: ' + error.message;
        loading.classList.remove('hidden');
    }
}

    // Enter tugmasi bilan login
    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
